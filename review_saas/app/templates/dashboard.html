<script>

// =====================================================
// LOAD COMPANIES
// =====================================================

async function loadCompanies() {

    try {

        const response = await fetch('/api/companies');

        const data = await response.json();

        const select = document.getElementById('companySelect');

        select.innerHTML = '<option value="">Choose Company</option>';

        data.forEach(company => {

            const option = document.createElement('option');

            option.value = company.id;

            option.textContent = company.name;

            select.appendChild(option);
        });

    } catch (err) {

        console.error(err);
    }
}

// =====================================================
// SAVE BUSINESS
// =====================================================

document.getElementById('saveBusinessBtn').onclick = async () => {

    try {

        const payload = {
            name: document.getElementById('companyName').value,
            place_id: document.getElementById('placeId').value,
            address: document.getElementById('companyAddress').value
        };

        const response = await fetch('/api/companies', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.detail || 'Save failed');
        }

        alert('✅ Business saved successfully');

        bootstrap.Modal.getInstance(
            document.getElementById('addBusinessModal')
        ).hide();

        loadCompanies();

    } catch (err) {

        console.error(err);

        alert('❌ ' + err.message);
    }
};

// =====================================================
// SYNC REVIEWS
// =====================================================

document.getElementById('syncBtn').onclick = async () => {

    try {

        const companyId = document.getElementById('companySelect').value;

        if (!companyId) {
            alert('Please select company');
            return;
        }

        const response = await fetch(
            `/api/reviews/ingest/${companyId}`,
            {
                method: 'POST'
            }
        );

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.detail || 'Sync failed');
        }

        alert(`✅ Reviews Added: ${data.reviews_collected}`);

    } catch (err) {

        console.error(err);

        alert('❌ ' + err.message);
    }
};

// =====================================================
// GOOGLE AUTOCOMPLETE
// =====================================================

function initializeGoogleAutocomplete() {

    try {

        const input = document.getElementById('googleSearchInput');

        if (!input) {
            console.error('❌ Input missing');
            return;
        }

        const autocomplete = new google.maps.places.Autocomplete(
            input,
            {
                types: ['establishment'],
                fields: [
                    'name',
                    'place_id',
                    'formatted_address'
                ]
            }
        );

        autocomplete.addListener('place_changed', () => {

            const place = autocomplete.getPlace();

            console.log(place);

            document.getElementById('companyName').value = place.name || '';

            document.getElementById('placeId').value = place.place_id || '';

            document.getElementById('companyAddress').value = place.formatted_address || '';
        });

        console.log('✅ Google Autocomplete Ready');

    } catch (err) {

        console.error(err);
    }
}

window.initializeGoogleAutocomplete = initializeGoogleAutocomplete;

window.onload = () => {

    loadCompanies();
};

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&libraries=places&callback=initializeGoogleAutocomplete">
</script>

</body>
</html>
