<!-- GOOGLE MAPS -->

<script>

window.initGoogleAutocomplete = function () {

    console.log("🚀 Google Autocomplete Starting");

    // =====================================================
    // INPUT FIELD
    // =====================================================

    const input =
        document.getElementById("googleSearchInput");

    if (!input) {

        console.error("❌ googleSearchInput not found");

        return;
    }

    // =====================================================
    // VERIFY GOOGLE API
    // =====================================================

    if (
        typeof google === "undefined" ||
        !google.maps ||
        !google.maps.places
    ) {

        console.error("❌ Google Places API failed to load");

        return;
    }

    // =====================================================
    // CREATE AUTOCOMPLETE
    // =====================================================

    const autocomplete =
        new google.maps.places.Autocomplete(
            input,
            {

                types: ['establishment'],

                fields: [
                    'place_id',
                    'name',
                    'formatted_address'
                ]
            }
        );

    console.log("✅ Autocomplete Object Created");

    // =====================================================
    // ON PLACE SELECT
    // =====================================================

    autocomplete.addListener('place_changed', function () {

        const place = autocomplete.getPlace();

        console.log("📍 Selected Place:", place);

        // =================================================
        // VALIDATION
        // =================================================

        if (!place || !place.place_id) {

            alert("❌ Invalid Place Selected");

            return;
        }

        // =================================================
        // AUTO FILL INPUTS
        // =================================================

        const companyName =
            document.getElementById("companyName");

        const placeId =
            document.getElementById("placeId");

        const address =
            document.getElementById("companyAddress");

        if (companyName) {
            companyName.value =
                place.name || '';
        }

        if (placeId) {
            placeId.value =
                place.place_id || '';
        }

        if (address) {
            address.value =
                place.formatted_address || '';
        }

        console.log("✅ Google Autofill Success");
    });

    console.log("✅ Google Places Ready");
};

</script>

<!-- ===================================================== -->

<script async defer
src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&libraries=places&callback=initGoogleAutocomplete">

<!-- ADD BUSINESS MODAL -->
<!-- ===================================================== -->

<div class="modal fade"
     id="addCompanyModal"
     tabindex="-1">

    <div class="modal-dialog modal-lg modal-dialog-centered">

        <form id="addCompanyForm"
              class="modal-content border-0 shadow-lg">

            <div class="modal-header bg-success text-white">

                <h5 class="modal-title">

                    Add Business

                </h5>

                <button type="button"
                        class="btn-close btn-close-white"
                        data-bs-dismiss="modal"></button>

            </div>

            <div class="modal-body p-4">

                <!-- SEARCH -->

                <input id="googleSearchInput"
                       class="form-control form-control-lg mb-4"
                       placeholder="Search Google Maps...">

                <!-- RESULTS -->

                <div class="bg-light p-4 rounded-4">

                    <div class="mb-3">

                        <label class="form-label">

                            Business Name

                        </label>

                        <input id="companyName"
                               class="form-control"
                               readonly>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Google Place ID

                        </label>

                        <input id="placeId"
                               class="form-control"
                               readonly>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Address

                        </label>

                        <input id="companyAddress"
                               class="form-control"
                               readonly>

                    </div>

                </div>

            </div>

            <div class="modal-footer border-0">

                <button type="submit"
                        class="btn btn-success w-100 rounded-pill fw-bold py-3">

                    Save Business

                </button>

            </div>

        </form>

    </div>

</div>

<!-- ===================================================== -->
<!-- SAVE BUSINESS -->
<!-- ===================================================== -->

<script>

document.getElementById('addCompanyForm').onsubmit =
async (e) => {

    e.preventDefault();

    const payload = {

        name:
            document.getElementById('companyName').value,

        place_id:
            document.getElementById('placeId').value,

        address:
            document.getElementById('companyAddress').value
    };

    if (!payload.place_id) {

        alert("Please select a business");

        return;
    }

    try {

        const res = await fetch('/api/companies', {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify(payload)
        });

        if (res.ok) {

            alert("✅ Business Added Successfully");

            location.reload();

        } else {

            const error = await res.json();

            alert(
                error.detail || "Failed to save"
            );
        }

    } catch (e) {

        console.error("❌ Save failed:", e);

        alert("Network error");
    }
};

</script>
