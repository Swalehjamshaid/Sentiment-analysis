<!-- ========================================================= -->
<!-- FILE: templates/dashboard.html -->
<!-- REVIEW INTEL AI — ENTERPRISE EXECUTIVE DASHBOARD -->
<!-- FULLY SYNCHRONIZED VERSION -->
<!-- MAY 2026 -->
<!-- ========================================================= -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8"/>

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>
        Review Intel AI Dashboard
    </title>

    <!-- ===================================================== -->
    <!-- GOOGLE FONTS -->
    <!-- ===================================================== -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- ===================================================== -->
    <!-- BOOTSTRAP -->
    <!-- ===================================================== -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet"
    >

    <!-- ===================================================== -->
    <!-- CHARTJS -->
    <!-- ===================================================== -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- ===================================================== -->
    <!-- STYLE -->
    <!-- ===================================================== -->

    <style>

        :root{

            --primary:#6366f1;
            --secondary:#8b5cf6;
            --success:#10b981;
            --danger:#ef4444;
            --warning:#f59e0b;
            --dark:#0f172a;
            --card:#111827;
            --text:#f8fafc;
        }

        *{

            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:
                radial-gradient(
                    circle at top left,
                    #312e81,
                    #0f172a
                );

            font-family:
                'Inter',
                sans-serif;

            color:white;

            min-height:100vh;

            overflow-x:hidden;
        }

        /* ================================================= */
        /* SCROLLBAR */
        /* ================================================= */

        ::-webkit-scrollbar{

            width:10px;
        }

        ::-webkit-scrollbar-track{

            background:#111827;
        }

        ::-webkit-scrollbar-thumb{

            background:#6366f1;
            border-radius:20px;
        }

        /* ================================================= */
        /* LOADING */
        /* ================================================= */

        .loading-overlay{

            position:fixed;

            inset:0;

            background:
                rgba(15,23,42,0.85);

            display:none;

            justify-content:center;

            align-items:center;

            z-index:999999;
        }

        /* ================================================= */
        /* GLASS CARD */
        /* ================================================= */

        .glass-card{

            background:
                rgba(255,255,255,0.07);

            backdrop-filter:
                blur(18px);

            border:
                1px solid rgba(255,255,255,0.08);

            border-radius:28px;

            padding:24px;

            box-shadow:
                0 15px 35px rgba(0,0,0,0.25);
        }

        /* ================================================= */
        /* HEADER */
        /* ================================================= */

        .dashboard-header{

            margin-top:24px;

            padding:28px;

            border-radius:30px;

            background:
                linear-gradient(
                    135deg,
                    rgba(99,102,241,0.22),
                    rgba(139,92,246,0.18)
                );

            backdrop-filter:
                blur(20px);

            border:
                1px solid rgba(255,255,255,0.08);
        }

        .brand-title{

            font-size:40px;

            font-weight:800;
        }

        .brand-sub{

            color:#cbd5e1;

            margin-top:5px;
        }

        /* ================================================= */
        /* BUTTONS */
        /* ================================================= */

        .btn-enterprise{

            border:none;

            border-radius:18px;

            min-height:54px;

            padding:14px 24px;

            font-weight:700;

            transition:0.3s ease;
        }

        .btn-enterprise:hover{

            transform:
                translateY(-3px);
        }

        /* ================================================= */
        /* KPI */
        /* ================================================= */

        .kpi-card{

            position:relative;

            overflow:hidden;

            min-height:200px;

            transition:0.35s ease;
        }

        .kpi-card:hover{

            transform:
                translateY(-8px);
        }

        .kpi-title{

            font-size:13px;

            font-weight:700;

            opacity:0.9;

            letter-spacing:1px;
        }

        .kpi-value{

            font-size:48px;

            font-weight:800;

            margin-top:18px;
        }

        .kpi-icon{

            position:absolute;

            right:18px;

            bottom:18px;

            font-size:58px;

            opacity:0.12;
        }

        /* ================================================= */
        /* GRADIENTS */
        /* ================================================= */

        .gradient-blue{

            background:
                linear-gradient(
                    135deg,
                    #2563eb,
                    #1d4ed8
                );
        }

        .gradient-green{

            background:
                linear-gradient(
                    135deg,
                    #10b981,
                    #059669
                );
        }

        .gradient-red{

            background:
                linear-gradient(
                    135deg,
                    #ef4444,
                    #dc2626
                );
        }

        .gradient-purple{

            background:
                linear-gradient(
                    135deg,
                    #8b5cf6,
                    #7c3aed
                );
        }

        /* ================================================= */
        /* FORMS */
        /* ================================================= */

        .form-select,
        .form-control{

            min-height:56px;

            border:none;

            border-radius:18px;

            background:
                rgba(255,255,255,0.08);

            color:white;
        }

        .form-select option{

            color:black;
        }

        /* ================================================= */
        /* TABLE */
        /* ================================================= */

        .table{

            color:white;
        }

        .table thead{

            background:
                rgba(255,255,255,0.08);
        }

        .table tbody tr:hover{

            background:
                rgba(255,255,255,0.05);
        }

        /* ================================================= */
        /* CHATBOT */
        /* ================================================= */

        #aiChatbotContainer{

            position:fixed;

            bottom:20px;

            right:20px;

            width:380px;

            height:640px;

            background:
                rgba(17,24,39,0.92);

            backdrop-filter:
                blur(20px);

            border:
                1px solid rgba(255,255,255,0.08);

            border-radius:28px;

            overflow:hidden;

            z-index:9999;

            display:flex;

            flex-direction:column;
        }

        #aiChatbotHeader{

            padding:18px;

            background:
                linear-gradient(
                    135deg,
                    #6366f1,
                    #8b5cf6
                );

            font-weight:700;
        }

        #aiChatMessages{

            flex:1;

            overflow-y:auto;

            padding:18px;

            background:#111827;
        }

        .chatMessage{

            padding:14px;

            border-radius:16px;

            margin-bottom:16px;

            line-height:1.7;
        }

        .userMessage{

            background:#2563eb;

            margin-left:40px;
        }

        .botMessage{

            background:
                rgba(255,255,255,0.08);

            margin-right:40px;
        }

        #aiChatInputContainer{

            display:flex;

            padding:14px;

            background:#0f172a;
        }

        #aiChatInput{

            flex:1;

            border:none;

            border-radius:16px;

            padding:14px;

            background:
                rgba(255,255,255,0.08);

            color:white;
        }

        #aiChatSendBtn{

            margin-left:12px;

            border:none;

            border-radius:16px;

            background:#6366f1;

            color:white;

            padding:14px 18px;

            font-weight:700;
        }

        /* ================================================= */
        /* MOBILE */
        /* ================================================= */

        @media(max-width:992px){

            #aiChatbotContainer{

                width:100%;
                right:0;
                bottom:0;
                height:70vh;

                border-radius:
                    24px 24px 0 0;
            }
        }

    </style>

</head>

<body>

<!-- ===================================================== -->
<!-- LOADING -->
<!-- ===================================================== -->

<div
    class="loading-overlay"
    id="loadingOverlay"
>

    <div
        class="spinner-border text-light"
        style="width:5rem;height:5rem"
    ></div>

</div>

<!-- ===================================================== -->
<!-- CONTAINER -->
<!-- ===================================================== -->

<div class="container-fluid px-4 pb-5">

    <!-- ================================================= -->
    <!-- HEADER -->
    <!-- ================================================= -->

    <div class="dashboard-header">

        <div class="d-flex flex-wrap justify-content-between align-items-center gap-4">

            <div>

                <div class="brand-title">

                    <i class="bi bi-cpu-fill"></i>

                    Review Intel AI

                </div>

                <div class="brand-sub">

                    Enterprise AI Reputation Intelligence

                </div>

            </div>

            <div class="d-flex flex-wrap gap-3">

                <button
                    class="btn btn-light btn-enterprise"
                    data-bs-toggle="modal"
                    data-bs-target="#addBusinessModal"
                >
                    <i class="bi bi-plus-circle"></i>
                    Add Business
                </button>

                <button
                    class="btn btn-success btn-enterprise"
                    id="syncBtn"
                >
                    <i class="bi bi-arrow-repeat"></i>
                    Sync Reviews
                </button>

                <button
                    class="btn btn-warning btn-enterprise"
                    id="refreshDashboardBtn"
                >
                    <i class="bi bi-arrow-clockwise"></i>
                    Refresh
                </button>

                <button
                    class="btn btn-danger btn-enterprise"
                    id="logoutBtn"
                >
                    <i class="bi bi-box-arrow-right"></i>
                    Logout
                </button>

            </div>

        </div>

    </div>

    <!-- ================================================= -->
    <!-- FILTERS -->
    <!-- ================================================= -->

    <div class="glass-card mt-4">

        <div class="row g-4">

            <div class="col-lg-6">

                <label class="mb-2 fw-bold">

                    Select Company

                </label>

                <select
                    class="form-select"
                    id="companySelect"
                >

                    <option value="">
                        Choose Company
                    </option>

                </select>

            </div>

            <div class="col-lg-3">

                <label class="mb-2 fw-bold">
                    Timeline
                </label>

                <select
                    class="form-select"
                    id="dateRange"
                >

                    <option value="7">7 Days</option>
                    <option value="30">30 Days</option>
                    <option value="90">90 Days</option>
                    <option value="365" selected>
                        12 Months
                    </option>

                    <option value="99999">
                        All Historical Data
                    </option>

                </select>

            </div>

            <div class="col-lg-3">

                <label class="mb-2 fw-bold">
                    Review Filter
                </label>

                <select
                    class="form-select"
                    id="reviewFilter"
                >

                    <option value="all">
                        All Reviews
                    </option>

                    <option value="positive">
                        Positive Reviews
                    </option>

                    <option value="negative">
                        Negative Reviews
                    </option>

                </select>

            </div>

        </div>

    </div>

    <!-- ================================================= -->
    <!-- KPI -->
    <!-- ================================================= -->

    <div class="row mt-4 g-4">

        <div class="col-lg-3 col-md-6">

            <div class="glass-card kpi-card gradient-blue">

                <div class="kpi-title">
                    TOTAL REVIEWS
                </div>

                <div
                    class="kpi-value"
                    id="totalReviews"
                >
                    0
                </div>

                <div class="kpi-icon">
                    <i class="bi bi-chat-dots"></i>
                </div>

            </div>

        </div>

        <div class="col-lg-3 col-md-6">

            <div class="glass-card kpi-card gradient-green">

                <div class="kpi-title">
                    AVERAGE RATING
                </div>

                <div
                    class="kpi-value"
                    id="avgRating"
                >
                    0
                </div>

                <div class="kpi-icon">
                    <i class="bi bi-star-fill"></i>
                </div>

            </div>

        </div>

        <div class="col-lg-3 col-md-6">

            <div class="glass-card kpi-card gradient-red">

                <div class="kpi-title">
                    NEGATIVE REVIEWS
                </div>

                <div
                    class="kpi-value"
                    id="negativeReviews"
                >
                    0
                </div>

                <div class="kpi-icon">
                    <i class="bi bi-emoji-frown"></i>
                </div>

            </div>

        </div>

        <div class="col-lg-3 col-md-6">

            <div class="glass-card kpi-card gradient-purple">

                <div class="kpi-title">
                    BUSINESS HEALTH
                </div>

                <div
                    class="kpi-value"
                    id="businessHealthScore"
                >
                    0%
                </div>

                <div class="kpi-icon">
                    <i class="bi bi-heart-pulse"></i>
                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
